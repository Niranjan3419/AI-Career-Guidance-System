<!DOCTYPE html>
<html>
<head>
    <title>Register - AI Career Guidance</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<nav class="navbar">
    <div class="logo">AI Career Guide</div>
    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/about">About</a>
        <a href="/contact">Contact</a>
        <a href="/login">Login</a>
    </div>
</nav>

<section class="auth-page">
    <div class="floating-icons">
        <span>👨‍💻</span>
        <span>🤖</span>
        <span>📊</span>
        <span>🎨</span>
        <span>👨‍🏫</span>
    </div>

    <div class="auth-card">
        <div class="auth-left">
            <h1>Create Your Account</h1>
            <p>Start your AI-powered career guidance journey and find your best future path.</p>
            <div class="auth-badge">🎯 Personalized career match</div>
        </div>

        <div class="auth-right">
            <h2>Register</h2>

            <form method="POST">
                <input type="text" name="name" placeholder="Full Name" required>
                <input type="email" name="email" placeholder="Email Address" required>
                <input type="password" name="password" placeholder="Password" required>
                <input type="password" name="confirm_password" placeholder="Confirm Password" required>

                <button type="submit">Create Account</button>
            </form>

            <p>Already have an account? <a href="/login">Login</a></p>
        </div>
    </div>
</section>

</body>
</html>
